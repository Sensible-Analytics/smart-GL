name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pnpm install
          pip install -r apps/api/requirements.txt
          
      - name: Lint Python
        run: |
          pip install ruff
          ruff check apps/api/ --ignore F401
          
      - name: Type check
        run: pnpm turbo typecheck
        
      - name: Test
        run: pnpm turbo test
        
  type-check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install and build
        run: |
          pnpm install --filter web
          cd apps/web && pnpm build